name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['agent/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    name: Web — lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  mobile-checks:
    name: Mobile — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint:check
      - run: npm run compile
      - run: npm test -- --passWithNoTests
