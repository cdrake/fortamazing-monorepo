name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['agent/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    name: Web — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./apps/web lint

  mobile-checks:
    name: Mobile — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./apps/mobile lint:check
      - run: pnpm --filter ./apps/mobile compile
      - run: pnpm --filter ./apps/mobile test -- --passWithNoTests
